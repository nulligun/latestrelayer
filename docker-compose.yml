services:
  # NGINX RTMP Server - Central relay hub
  nginx-rtmp:
    build:
      context: ./nginx-rtmp
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-nginx-rtmp
    ports:
      - "${RTMP_PORT:-1936}:1936"  # RTMP port
      - "${HTTP_STATS_PORT:-8080}:8080"  # HTTP stats port
    networks:
      - rtmp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FFmpeg BRB (Be Right Back) Video Stream - Always running
  ffmpeg-brb:
    build:
      context: ./ffmpeg-brb
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-ffmpeg-brb
    volumes:
      - ${BRB_VIDEO_PATH}:/videos/offline.mp4:ro
    networks:
      - rtmp-network
    depends_on:
      nginx-rtmp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "ffmpeg"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FFmpeg Dev Camera Stream - Manual start only
  ffmpeg-cam-dev:
    profiles: ["manual"]
    build:
      context: ./ffmpeg-cam-dev
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-ffmpeg-cam-dev
    volumes:
      - ${BRB_VIDEO_PATH_2}:/videos/offline2.mp4:ro
    networks:
      - rtmp-network
    depends_on:
      nginx-rtmp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "ffmpeg"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FFmpeg SRT Listener - Relays SRT input to RTMP
  ffmpeg-srt:
    build:
      context: ./ffmpeg-srt
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-ffmpeg-srt
    ports:
      - "${SRT_PORT:-1937}:9000/udp"  # SRT port
    networks:
      - rtmp-network
    depends_on:
      nginx-rtmp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "ffmpeg"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FFmpeg Camera Normalizer - Normalizes camera streams for GStreamer compatibility
  ffmpeg-cam-normalized:
    profiles: ["manual"]
    build:
      context: ./ffmpeg-cam-normalized
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-ffmpeg-cam-normalized
    environment:
      - VIDEO_BITRATE=${CAM_RELAY_VIDEO_BITRATE:-3000}
      - AUDIO_BITRATE=${CAM_RELAY_AUDIO_BITRATE:-128}
      - FRAMERATE=${CAM_RELAY_FRAMERATE:-30}
      - GOP_SIZE=${CAM_RELAY_GOP_SIZE:-60}
      - MAX_RETRIES=${CAM_RELAY_MAX_RETRIES:-0}
      - RETRY_DELAY=${CAM_RELAY_RETRY_DELAY:-5}
      - STREAM_CHECK_INTERVAL=${CAM_RELAY_STREAM_CHECK_INTERVAL:-5}
    networks:
      - rtmp-network
    depends_on:
      nginx-rtmp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://nginx-rtmp:8080/stat > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Muxer - GStreamer-based stream multiplexer
  muxer:
    build:
      context: ./muxer
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-muxer
    ports:
      - "${MUXER_API_PORT:-8088}:8088"  # API port
    networks:
      - rtmp-network
    depends_on:
      nginx-rtmp:
        condition: service_healthy
      ffmpeg-brb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Auto-Switcher - Monitors streams and automatically switches based on quality
  stream-auto-switcher:
    build:
      context: ./stream-auto-switcher
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-auto-switcher
    environment:
      - STAT_URL=http://nginx-rtmp:8080/stat
      - SWITCH_API=http://muxer:8088/switch
      - APP_NAME=live
      - CAM_STREAM=cam
      - BRB_NAME=brb
      - MIN_BITRATE_KBPS=${MIN_BITRATE_KBPS:-300}
      - POLL_SECS=${AUTO_SWITCHER_POLL_SECS:-0.5}
      - CAM_MISS_TIMEOUT=${AUTO_SWITCHER_CAM_MISS_TIMEOUT:-3.0}
      - CAM_BACK_STABILITY=${AUTO_SWITCHER_CAM_BACK_STABILITY:-2.0}
    networks:
      - rtmp-network
    depends_on:
      nginx-rtmp:
        condition: service_healthy
      muxer:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "python3"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FFmpeg Kick Pusher - Manual start only
  ffmpeg-kick:
    profiles: ["manual"]
    stop_grace_period: 10s
    build:
      context: ./ffmpeg-kick
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-ffmpeg-kick
    environment:
      - KICK_URL=${KICK_URL}
      - KICK_KEY=${KICK_KEY}
    networks:
      - rtmp-network
    depends_on:
      muxer:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-x", "ffmpeg"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 75s

  # Container Controller - REST API for container lifecycle management
  stream-controller:
    build:
      context: ./stream-controller
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-controller
    ports:
      - "${CONTROLLER_API_PORT:-8089}:8089"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./.env:/app/.env:ro
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-relayer}
    networks:
      - rtmp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Stream Dashboard - Web UI for monitoring and control
  stream-dashboard:
    build:
      context: ./stream-dashboard
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - /proc/net/dev:/host_proc/net/dev:ro
    environment:
      - PORT=3000
      - CONTROLLER_API=http://stream-controller:8089
      - MUXER_API=http://muxer:8088
      - NGINX_STATS=http://nginx-rtmp:8080/stat
      - POLLING_INTERVAL=${DASHBOARD_POLLING_INTERVAL:-2000}
      - RTMP_DOMAIN=${RTMP_DOMAIN}
      - RTMP_PORT=${RTMP_PORT:-1936}
      - RTMP_STREAM_KEY=${RTMP_STREAM_KEY:-cam}
      - SRT_PORT=${SRT_PORT:-1937}
    networks:
      - rtmp-network
    depends_on:
      stream-controller:
        condition: service_healthy
      nginx-rtmp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  rtmp-network:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.enable_ipv6: "false"