services:
  # Compositor - GStreamer video mixer with SRT fade functionality
  compositor:
    stop_grace_period: 5s
    build:
      context: ./compositor
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-compositor
    ports:
      - "${SRT_PORT:-1937}:1937/udp"  # SRT listener port
      - "5000:5000"  # TCP server port for VLC testing
    networks:
      - rtmp-network
    restart: unless-stopped

  # Container Controller - REST API for container lifecycle management
  stream-controller:
    stop_grace_period: 2s
    build:
      context: ./stream-controller
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-controller
    ports:
      - "${CONTROLLER_API_PORT:-8089}:8089"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./.env:/app/.env:ro
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-relayer}
    networks:
      - rtmp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Stream Dashboard - Web UI for monitoring and control
  stream-dashboard:
    stop_grace_period: 2s
    build:
      context: ./stream-dashboard
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - /proc/net/dev:/host_proc/net/dev:ro
    environment:
      - PORT=3000
      - CONTROLLER_API=http://stream-controller:8089
      - MUXER_API=http://compositor:5000
      - POLLING_INTERVAL=${DASHBOARD_POLLING_INTERVAL:-2000}
      - SRT_PORT=${SRT_PORT:-1937}
    networks:
      - rtmp-network
    depends_on:
      stream-controller:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  rtmp-network:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.enable_ipv6: "false"