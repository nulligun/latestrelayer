services:
  # Relayer - GStreamer video mixer with SRT input-selector architecture
  relayer:
    stop_grace_period: 5s
    build:
      context: ./relayer
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-relayer
    ports:
      - "${SRT_PORT:-1937}:1937/udp"  # SRT listener port
      - "${VIDEO_TCP_PORT:-1940}:1940"  # Video fallback TCP server port
      - "5000:5000"  # TCP server port for VLC testing
      - "8088:8088"  # HTTP API port for scene/privacy control
    volumes:
      - ${SHARED_FOLDER}:/app/shared:ro 
    environment:
      - GST_DEBUG=tcpserversrc:5,decodebin:4
      - FALLBACK_SOURCE=${FALLBACK_SOURCE:-}
      - VIDEO_TCP_PORT=${VIDEO_TCP_PORT:-1940}
      - VIDEO_WATCHDOG_TIMEOUT=${VIDEO_WATCHDOG_TIMEOUT:-2.0}
    networks:
      - rtmp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Offline Video - Streams fallback video to compositor
  offline-video:
    profiles:
      - manual
    stop_grace_period: 5s
    build:
      context: ./offline-video
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-offline-video
    volumes:
      - ${SHARED_FOLDER}:/app/shared:ro 
    environment:
      - VIDEO_PATH=/app/shared/offline.mp4
      - COMPOSITOR_HOST=relayer
      - COMPOSITOR_PORT=1940
      - RETRY_DELAY=1
      - MAX_RETRY_DELAY=10
    networks:
      - rtmp-network
    depends_on:
      relayer:
        condition: service_started
    restart: "no"
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Offline Browser - Streams web page rendering to compositor
  offline-browser:
    profiles:
      - manual
    stop_grace_period: 5s
    build:
      context: ./offline-browser
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-offline-browser
    volumes:
      - ${SHARED_FOLDER}:/app/shared:ro 
    environment:
      - OFFLINE_SOURCE_URL=${OFFLINE_SOURCE_URL:-https://example.com}
      - COMPOSITOR_HOST=relayer
      - COMPOSITOR_PORT=1940
      - DISPLAY_RESOLUTION=1920x1080
      - FRAME_RATE=30
      - RETRY_DELAY=1
      - MAX_RETRY_DELAY=10
    networks:
      - rtmp-network
    depends_on:
      relayer:
        condition: service_started
    restart: "no"
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Offline Image - Streams static image as video to compositor
  offline-image:
    profiles:
      - manual
    stop_grace_period: 5s
    build:
      context: ./offline-image
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-offline-image
    volumes:
      - ${SHARED_FOLDER}:/app/shared:ro 
    environment:
      - IMAGE_PATH=/app/shared/offline.png
      - COMPOSITOR_HOST=relayer
      - COMPOSITOR_PORT=1940
      - RETRY_DELAY=1
      - MAX_RETRY_DELAY=10
    networks:
      - rtmp-network
    depends_on:
      relayer:
        condition: service_started
    restart: "no"
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Container Controller - REST API for container lifecycle management
  stream-controller:
    stop_grace_period: 2s
    build:
      context: ./stream-controller
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-controller
    ports:
      - "${CONTROLLER_API_PORT:-8089}:8089"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_FOLDER}:/app:ro 
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-relayer}
      - SRT_DOMAIN=${SRT_DOMAIN:-}
      - SRT_PORT=${SRT_PORT:-1937}

    networks:
      - rtmp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Stream Dashboard - Web UI for monitoring and control
  stream-dashboard:
    stop_grace_period: 2s
    build:
      context: ./stream-dashboard
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-dashboard
    volumes:
      - /proc/net/dev:/host_proc/net/dev:ro
      - ${SHARED_FOLDER}:/app/shared:rw
    environment:
      - PORT=3000
      - CONTROLLER_API=http://stream-controller:8089
      - COMPOSITOR_API=http://relayer:8088
      - POLLING_INTERVAL=${DASHBOARD_POLLING_INTERVAL:-2000}
      - SRT_PORT=${SRT_PORT:-1937}
      - SRT_DOMAIN=${SRT_DOMAIN:-}
    networks:
      - rtmp-network
    depends_on:
      stream-controller:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Nginx Proxy - HTTPS reverse proxy with basic auth
  nginx-proxy:
    stop_grace_period: 2s
    build:
      context: ./nginx-proxy
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-nginx-proxy
    ports:
      - "443:443"
    environment:
      - NGINX_USER=${NGINX_USER:-admin}
      - NGINX_PASSWORD=${NGINX_PASSWORD:-changeme}
    networks:
      - rtmp-network
    depends_on:
      stream-dashboard:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:443/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FFmpeg Kick - Streams to Kick.com
  ffmpeg-kick:
    profiles:
      - manual
    stop_grace_period: 5s
    build:
      context: ./ffmpeg-kick
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-relayer}-ffmpeg-kick
    volumes:
      - ${SHARED_FOLDER}:/app/shared:ro
    environment:
      - COMPOSITOR_HOST=relayer
      - COMPOSITOR_PORT=5000
      - CONFIG_PATH=/app/shared/kick_config.json
      - RETRY_DELAY=1
      - MAX_RETRY_DELAY=10
      - KICK_KEY=${KICK_KEY:-your_kick_stream_key}
      - KICK_URL=${KICK_URL:-rtmp://live.kick.com/app/}
    networks:
      - rtmp-network
    depends_on:
      relayer:
        condition: service_started
    restart: "no"
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  rtmp-network:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.enable_ipv6: "false"
      com.docker.network.driver.mtu: "1500"